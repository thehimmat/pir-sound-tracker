app = "pir-sound-tracker-poller"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  MOCK_MODE  = "false"
  CROP_X     = "0"
  CROP_Y     = "46"
  CROP_W     = "100"
  CROP_H     = "28"
  TESSDATA_DIR = "/app/tessdata"

# Secrets (IMAGE_URL, SUPABASE_URL, SUPABASE_ANON_KEY) set via: fly secrets set

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = false

  [[http_service.checks]]
    interval      = "30s"
    timeout       = "5s"
    grace_period  = "15s"
    method        = "GET"
    path          = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
